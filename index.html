<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='40%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%23C07858'/%3E%3Cstop offset='100%25' stop-color='%236B1020'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ctext y='.9em' font-size='90' text-anchor='middle' x='50' fill='url(%23g)'%3E%E2%99%A5%3C/text%3E%3C/svg%3E">
  <meta name="description" content="showing you i care, the way i know best.">
  <title>A Letter For Mom ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Libre+Baskerville:ital,wght@1,400&family=Playfair+Display:ital,wght@1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════
       Reset & Base
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      height: -webkit-fill-available;
      background:
        radial-gradient(ellipse at 50% 38%, #FDF8F8 0%, #F3E6E8 48%, #E2D0D2 100%);
    }

    body {
      min-height: 100%;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      background:
        radial-gradient(ellipse at 50% 38%, #FDF8F8 0%, #F3E6E8 48%, #E2D0D2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════════════════════════════════
       Background Floating Hearts
    ═══════════════════════════════════════════ */
    .bg-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-heart {
      position: absolute;
      color: #C08898;
      opacity: 0;
      font-size: var(--size, 12px);
      animation: floatHeart var(--dur, 7s) ease-in-out infinite var(--delay, 0s);
      user-select: none;
    }

    @keyframes floatHeart {
      0%   { opacity: 0;             transform: translateY(10px) scale(0.82); }
      22%  { opacity: var(--a, 0.2); }
      78%  { opacity: var(--a, 0.2); }
      100% { opacity: 0;             transform: translateY(-18px) scale(1.06); }
    }

    /* ═══════════════════════════════════════════
       Scene Container
    ═══════════════════════════════════════════ */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
    }

    .env-to {
      font-family: 'Dancing Script', cursive;
      font-size: 26px;
      color: #8B4858;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
      opacity: 0.88;
    }

    /* ═══════════════════════════════════════════
       Envelope Wrapper
    ═══════════════════════════════════════════ */
    .env-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.75s ease 0.55s, transform 0.75s cubic-bezier(0.4,0,0.2,1) 0.55s;
    }

    .env-wrap.fade-out {
      opacity: 0;
      transform: scale(0.87) translateY(14px);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════
       The Envelope
    ═══════════════════════════════════════════ */
    .envelope {
      position: relative;
      width: 288px;
      height: 202px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      animation: envBob 4.6s ease-in-out infinite;
      filter:
        drop-shadow(0 16px 36px rgba(150, 80, 95, 0.24))
        drop-shadow(0 5px 12px rgba(150, 80, 95, 0.15));
    }

    .envelope.still { animation: none; }

    @keyframes envBob {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      38%       { transform: translateY(-8px) rotate(0.25deg); }
      72%       { transform: translateY(-4px) rotate(-0.25deg); }
    }

    /* ── Envelope base body — cream/ivory ── */
    .env-body {
      position: absolute;
      inset: 0;
      background: linear-gradient(150deg, #FBF6EE 0%, #F2E8D8 100%);
      border-radius: 3px;
    }

    .env-body::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3px;
      background: radial-gradient(ellipse at 50% 72%, rgba(170, 90, 100, 0.07) 0%, transparent 62%);
      pointer-events: none;
    }

    .env-body::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3px;
      background:
        linear-gradient(to bottom right,
          transparent 49.6%, rgba(160, 90, 105, 0.09) 50%,
          transparent 50.4%),
        linear-gradient(to bottom left,
          transparent 49.6%, rgba(160, 90, 105, 0.09) 50%,
          transparent 50.4%);
      pointer-events: none;
    }

    /* ── Side + bottom flaps — dusty rose ── */
    .env-flap-bottom {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 100%, 100% 100%, 50% 52%);
      background: linear-gradient(to top, #B87080, #CC8898);
    }

    .env-flap-left {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 0 100%, 50.4% 52%);
      background: linear-gradient(to right, #B87080, #CC8898);
    }

    .env-flap-right {
      position: absolute;
      inset: 0;
      clip-path: polygon(100% 0, 100% 100%, 49.6% 52%);
      background: linear-gradient(to left, #B87080, #CC8898);
    }

    /* ── Fold lines ── */
    .env-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* ── Top flap — pronounced gradient to sell the fold ── */
    .env-flap-top {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 100% 0, 50% 53%);
      background: linear-gradient(180deg, #D898A8 0%, #B87080 38%, #88485C 100%);
      transform-origin: top center;
      transition: transform 2.3s cubic-bezier(0.34, 1.35, 0.64, 1);
      z-index: 12;
      border-radius: 3px 3px 0 0;
    }

    .env-flap-top::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, transparent 100%);
      pointer-events: none;
    }

    .env-flap-top.open {
      transform: perspective(750px) rotateX(-162deg);
    }

    /* ═══════════════════════════════════════════
       Wax Seal — warm burgundy with gold highlight
    ═══════════════════════════════════════════ */
    .wax-seal {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 14;
      background: radial-gradient(circle at 35% 30%, #FFF8EE 0%, #F5E8D8 50%, #E8D8C4 100%);
      box-shadow:
        0 3px 14px rgba(150, 80, 95, 0.30),
        0 1px 4px  rgba(150, 80, 95, 0.18),
        inset 0 1.5px 0 rgba(255, 255, 245, 0.80),
        inset 0 -2px 5px rgba(180, 140, 110, 0.20);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.42s ease;
    }

    .wax-seal::before {
      content: '♥';
      font-size: 26px;
      color: rgba(175, 90, 110, 0.90);
      text-shadow: 0 1px 2px rgba(200, 150, 160, 0.30);
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    .wax-seal::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1px solid rgba(200, 160, 140, 0.25);
    }

    .wax-seal.burst {
      transform: translateX(-50%) scale(1.22);
      opacity: 0;
      transition: transform 0.38s ease, opacity 0.40s ease 0.06s;
    }

    /* ═══════════════════════════════════════════
       Tap Hint
    ═══════════════════════════════════════════ */
    .tap-hint {
      margin-top: 28px;
      font-family: 'Dancing Script', cursive;
      font-size: 16px;
      color: #906070;
      letter-spacing: 0.02em;
      animation: hintPulse 2.8s ease-in-out infinite;
      transition: opacity 0.35s ease;
    }

    .tap-hint.gone {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.38; }
      50%       { opacity: 0.82; }
    }

    /* ═══════════════════════════════════════════
       Sparkle Particles
    ═══════════════════════════════════════════ */
    .sparkle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 60;
      animation: sparkleOut var(--spd, 0.85s) ease-out forwards;
    }

    @keyframes sparkleOut {
      0%   { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.18); }
    }

    /* ═══════════════════════════════════════════
       Letter Overlay
    ═══════════════════════════════════════════ */
    .letter-overlay {
      position: fixed;
      inset: 0;
      overflow-y: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 18px 56px;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 0.85s ease 0.72s, visibility 0s linear 0.85s;
      z-index: 10;
    }

    .letter-overlay.show {
      opacity: 1;
      pointer-events: all;
      visibility: visible;
      transition: opacity 0.85s ease 0.72s, visibility 0s linear 0s;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: radial-gradient(ellipse at 50% 38%, #FDF8F8 0%, #F3E6E8 48%, #E2D0D2 100%);
    }

    /* ═══════════════════════════════════════════
       Letter Card
    ═══════════════════════════════════════════ */
    .letter-card {
      width: 100%;
      max-width: 360px;
      background: #FFFDF8;
      border-radius: 2px;
      padding: 48px 24px 52px;
      position: relative;
      transform: translateY(32px);
      transition: transform 0.95s cubic-bezier(0.16, 1, 0.3, 1) 0.68s;
      box-shadow:
        0 28px 72px rgba(70, 15, 25, 0.12),
        0 8px  22px rgba(70, 15, 25, 0.08),
        0 2px  5px  rgba(70, 15, 25, 0.05),
         1px 1px 0 rgba(235, 215, 195, 0.7),
        -1px 1px 0 rgba(235, 215, 195, 0.7);
    }

    .letter-overlay.show .letter-card {
      transform: translateY(0);
    }

    .corner-heart {
      position: absolute;
      font-size: 10px;
      color: #A06050;
      opacity: 0.45;
    }
    .corner-tl { top: 15px; left: 19px; }
    .corner-tr { top: 15px; right: 19px; }

    /* ═══════════════════════════════════════════
       Letter Interior
    ═══════════════════════════════════════════ */
    .letter-date {
      font-family: 'Dancing Script', cursive;
      font-size: 13px;
      color: #7A5040;
      text-align: right;
      margin-bottom: 22px;
      letter-spacing: 0.01em;
    }

    .letter-salutation {
      font-family: 'Dancing Script', cursive;
      font-size: 27px;
      font-weight: 700;
      color: #A05868;
      line-height: 1.25;
      margin-bottom: 5px;
    }

    .letter-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #C4907A, transparent);
      opacity: 0.55;
    }

    .divider-hearts {
      font-size: 9px;
      color: #B07060;
      letter-spacing: 4px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════
       ✦  LETTER BODY — EDIT YOUR MESSAGE HERE  ✦
    ═══════════════════════════════════════════ */
    .letter-body {
      font-family: 'Libre Baskerville', serif;
      font-weight: 300;
      font-style: normal;
      font-size: 14px;
      line-height: 1.85;
      color: #2C1C18;
      letter-spacing: 0.012em;
    }

    .letter-body p            { margin-bottom: 22px; }
    .letter-body p:last-child { margin-bottom: 0; }

    /* ═══════════════════════════════════════════
       Letter Closing
    ═══════════════════════════════════════════ */
    .letter-closing {
      margin-top: 30px;
    }

    .closing-text {
      font-family: 'Dancing Script', cursive;
      font-size: 18px;
      color: #7A5040;
      margin-bottom: 22px;
      letter-spacing: 0.01em;
    }

    .letter-signature {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      font-weight: 700;
      color: #A05868;
      line-height: 1.2;
    }

    .letter-hearts-end {
      text-align: center;
      margin-top: 38px;
      color: #B07060;
      font-size: 14px;
      letter-spacing: 7px;
      padding-left: 7px;
      animation: heartBeat 2.4s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      12%       { transform: scale(1.20); }
      26%       { transform: scale(1); }
      40%       { transform: scale(1.11); }
      54%       { transform: scale(1); }
    }

    /* ═══════════════════════════════════════════
       Replay Button
    ═══════════════════════════════════════════ */
    .replay-btn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(100, 30, 40, 0.30);
      background: rgba(251, 246, 238, 0.80);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #A05868;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.2s ease;
      box-shadow: 0 2px 10px rgba(60, 10, 20, 0.10);
      -webkit-tap-highlight-color: transparent;
      z-index: 20;
    }

    .replay-btn.show     { opacity: 0.62; pointer-events: all; }
    .replay-btn:active   { opacity: 1; transform: scale(1.08); }

    /* ═══════════════════════════════════════════
       Reduced Motion
    ═══════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      .envelope          { animation: none !important; }
      .bg-heart          { animation: none !important; opacity: 0.08 !important; }
      .tap-hint          { animation: none !important; opacity: 0.85 !important; }
      .env-flap-top      { transition-duration: 0.05s !important; }
      .letter-hearts-end { animation: none !important; }
      .env-wrap,
      .letter-overlay,
      .letter-card,
      .wax-seal          { transition-duration: 0.1s !important; transition-delay: 0s !important; }
    }
  </style>
</head>

<body>

  <div class="bg-hearts" id="bgHearts"></div>

  <div class="scene">

    <div class="env-wrap" id="envWrap">

      <div class="env-to">For Mom ♡</div>
      <div class="envelope" id="envelope">
        <div class="env-body"></div>
        <div class="env-flap-bottom"></div>
        <div class="env-flap-left"></div>
        <div class="env-flap-right"></div>
        <svg class="env-lines" viewBox="0 0 288 202" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <line x1="0"   y1="0"   x2="144" y2="107" stroke="rgba(155,85,100,0.11)" stroke-width="0.75"/>
          <line x1="288" y1="0"   x2="144" y2="107" stroke="rgba(155,85,100,0.11)" stroke-width="0.75"/>
          <line x1="0"   y1="202" x2="144" y2="107" stroke="rgba(155,85,100,0.11)" stroke-width="0.75"/>
          <line x1="288" y1="202" x2="144" y2="107" stroke="rgba(155,85,100,0.11)" stroke-width="0.75"/>
        </svg>
        <div class="env-flap-top" id="flapTop"></div>
        <div class="wax-seal" id="waxSeal"></div>
      </div>

      <div class="tap-hint" id="tapHint">tap to open ♡</div>
    </div>

  </div>

  <div class="letter-overlay" id="letterOverlay">
    <div class="letter-card">

      <span class="corner-heart corner-tl">♥</span>
      <span class="corner-heart corner-tr">♥</span>

      <div class="letter-date" id="letterDate"></div>

      <!-- ════════════════════════════════════════════════
           ✦  EDIT YOUR LETTER CONTENT BELOW THIS LINE  ✦
           ════════════════════════════════════════════════ -->

      <div class="letter-salutation">For Mom ♡</div>

      <div class="letter-divider">
        <div class="divider-line"></div>
        <div class="divider-hearts">♥ ♥ ♥</div>
        <div class="divider-line"></div>
      </div>

      <div class="letter-body">
        <p>A mother's love is warm and bright,<br>It fills our hearts with joy and light.</p>

        <p>Through every day, in all they do,<br>Moms, we know your love is true!</p>

        <p>Today's a day to celebrate,<br>To say we love you — Mom, you're great!</p>
      </div>

      <!-- Change "Drew" to your name -->
      <div class="letter-closing">
        <div class="closing-text">Sincerely,</div>
        <div class="letter-signature">Tori + Drew ♡</div>
      </div>

      <!-- ════════════════════════════════════════════════
           ✦  END OF EDITABLE CONTENT  ✦
           ════════════════════════════════════════════════ -->

      <div class="letter-hearts-end">♥ ♥ ♥</div>

    </div>
  </div>

  <button class="replay-btn" id="replayBtn" aria-label="Replay">↺</button>

  <script>
    /* ── Ambient background hearts ── */
    (function () {
      const c = document.getElementById('bgHearts');
      [
        { l:'7%',  t:'9%',  s:'18px', d:'6.8s', dl:'0s',    a:'0.38' },
        { l:'87%', t:'7%',  s:'14px', d:'8.2s', dl:'1.9s',  a:'0.32' },
        { l:'13%', t:'73%', s:'16px', d:'7.1s', dl:'0.8s',  a:'0.35' },
        { l:'83%', t:'79%', s:'20px', d:'7.6s', dl:'2.3s',  a:'0.30' },
        { l:'50%', t:'4%',  s:'12px', d:'9.4s', dl:'3.2s',  a:'0.28' },
        { l:'4%',  t:'44%', s:'17px', d:'8.1s', dl:'1.0s',  a:'0.34' },
        { l:'93%', t:'40%', s:'13px', d:'9.8s', dl:'2.7s',  a:'0.29' },
        { l:'35%', t:'89%', s:'18px', d:'7.3s', dl:'0.4s',  a:'0.36' },
        { l:'65%', t:'84%', s:'13px', d:'10.2s',dl:'4.4s',  a:'0.27' },
        { l:'23%', t:'19%', s:'11px', d:'11.1s',dl:'1.3s',  a:'0.30' },
      ].forEach(h => {
        const el = document.createElement('div');
        el.className = 'bg-heart';
        el.textContent = '♥';
        el.style.cssText =
          `left:${h.l};top:${h.t};--size:${h.s};--dur:${h.d};--delay:${h.dl};--a:${h.a}`;
        c.appendChild(el);
      });
    })();

    /* ── Auto-fill today's date ── */
    (function () {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const n = new Date();
      document.getElementById('letterDate').textContent =
        `${months[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
    })();

    /* ── Envelope interaction ── */
    const envelope      = document.getElementById('envelope');
    const envWrap       = document.getElementById('envWrap');
    const flapTop       = document.getElementById('flapTop');
    const waxSeal       = document.getElementById('waxSeal');
    const tapHint       = document.getElementById('tapHint');
    const letterOverlay = document.getElementById('letterOverlay');
    const replayBtn     = document.getElementById('replayBtn');
    let opened = false;

    function openEnvelope() {
      if (opened) return;
      opened = true;
      envelope.classList.add('still');
      tapHint.classList.add('gone');
      setTimeout(() => waxSeal.classList.add('burst'),        110);
      setTimeout(() => flapTop.classList.add('open'),         370);
      setTimeout(emitSparkles,                                680);
      setTimeout(() => envWrap.classList.add('fade-out'),     820);
      setTimeout(() => letterOverlay.classList.add('show'),   960);
      setTimeout(() => replayBtn.classList.add('show'),      2700);
    }

    /* ── Sparkle burst ── */
    function emitSparkles() {
      const r   = envelope.getBoundingClientRect();
      const cx  = r.left + r.width  / 2;
      const cy  = r.top  + r.height / 2;
      const pal = ['#E8C060','#CC8898','#F2E8D8','#C87080','#F5E0A0','#D4A0A8'];
      for (let i = 0; i < 18; i++) {
        const sp    = document.createElement('div');
        sp.className = 'sparkle';
        const angle  = (i / 18) * Math.PI * 2 + (Math.random() - 0.5) * 0.45;
        const dist   = 44 + Math.random() * 95;
        const size   = 3 + Math.random() * 5.5;
        const color  = pal[Math.floor(Math.random() * pal.length)];
        sp.style.cssText = [
          `left:${(cx + (Math.random() - 0.5) * 55).toFixed(1)}px`,
          `top:${(cy  + (Math.random() - 0.5) * 55).toFixed(1)}px`,
          `width:${size.toFixed(1)}px`,
          `height:${size.toFixed(1)}px`,
          `background:${color}`,
          `--tx:${(Math.cos(angle) * dist).toFixed(1)}px`,
          `--ty:${(Math.sin(angle) * dist).toFixed(1)}px`,
          `--spd:${(0.65 + Math.random() * 0.45).toFixed(2)}s`,
        ].join(';');
        document.body.appendChild(sp);
        sp.addEventListener('animationend', () => sp.remove());
      }
    }

    envelope.addEventListener('touchstart', function (e) {
      e.preventDefault();
      openEnvelope();
    }, { passive: false });

    envelope.addEventListener('click', openEnvelope);

    replayBtn.addEventListener('click', function () {
      opened = false;
      envelope.classList.remove('still');
      tapHint.classList.remove('gone');
      flapTop.classList.remove('open');
      waxSeal.classList.remove('burst');
      envWrap.classList.remove('fade-out');
      letterOverlay.classList.remove('show');
      replayBtn.classList.remove('show');
    });
  </script>
</body>
</html>
